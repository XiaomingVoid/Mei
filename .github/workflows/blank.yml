name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --no-configuration-cache \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:+UseParallelGC" \
            -Dorg.gradle.workers.max=4
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle

      - name: Get APK info
        id: apk_info
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: 未找到 APK 文件！"
            exit 1
          fi
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S')
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: warn

      - name: Create Release (on main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_attempt }}
          name: Build #${{ github.run_number }}
          body: |
            ## 构建信息
            - **构建号**: ${{ github.run_number }}
            - **分支**: ${{ github.ref_name }}
            - **提交**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **提交人**: ${{ github.actor }}
            - **构建时间**: ${{ steps.apk_info.outputs.build_time }}
            
            ## APK 信息
            - **名称**: ${{ steps.apk_info.outputs.apk_name }}
            - **大小**: ${{ steps.apk_info.outputs.apk_size }}
            
            ## 下载
            详见附件
          files: ${{ steps.apk_info.outputs.apk_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.run_number }}
          path: |
            build/reports/
            app/build/reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment PR with build result
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}' === 'success' ? '✅ 成功' : '❌ 失败';
            const apkName = '${{ steps.apk_info.outputs.apk_name }}' || 'N/A';
            const apkSize = '${{ steps.apk_info.outputs.apk_size }}' || 'N/A';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## APK 构建结果 ${conclusion}\n\n- **APK 名称**: ${apkName}\n- **大小**: ${apkSize}`
            });
