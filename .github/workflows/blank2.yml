name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # 支持在 GitHub 页面手动点击触发构建

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整检出历史，方便某些依赖插件计算版本号

      # 2. 设置 JDK 环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 设置 Gradle 环境（自带极速依赖与配置缓存管理）
      # 这能有效避免各种由于环境不一致导致的 Configuration Cache 异常
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. 授予 Gradle 执行权限
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 5. 执行编译打包（不带签名步骤）
      # 使用 assembleDebug 直接编译出未经签名的 Debug APK。
      # 如果你想编译 Release 版本但跳过签名，可以改为使用 assembleRelease。
      # 因为 Android 默认构建对 Debug 会自动应用默认签名，而对 Release 如果未配置签名则会直接输出未签名（unsigned）的 APK。
      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      # 6. 将生成的 APK 收集并上传到 GitHub Actions Artifacts
      # 编译完成后，你可以在 GitHub Action 的运行结果页面直接下载该 APK。
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7 # 在 GitHub 上保留 7 天
