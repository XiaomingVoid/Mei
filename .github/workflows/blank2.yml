- name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 使用官方 Action 自动处理 Gradle 环境和依赖缓存
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 规范执行打包命令
    - name: Build APK
      run: ./gradlew assembleDebug
